server.port=9097
spring.application.name=slo-provisioner-service
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}
spring.data.mongodb.database=${MONGODB_DATABASE:open-slo}
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.resource.attributes.service.name=${OTEL_SERVICE_NAME:slo-provisioner-service},deployment.environment=${OTEL_DEPLOYMENT_ENVIRONMENT:development}
observability-mesh.slo-provisioner.poll-interval-ms=60000
observability-mesh.slo-provisioner.openslo-collection=service-level-objectives
observability-mesh.slo-provisioner.provision-state-collection=slo-provision-state
observability-mesh.slo-provisioner.prometheus-rules-dir=${PROMETHEUS_RULES_DIR:./target/sloth-rules}
observability-mesh.slo-provisioner.archive-subdir=_archive
observability-mesh.slo-provisioner.prometheus-reload-url=${PROMETHEUS_RELOAD_URL:http://localhost:9092/-/reload}
observability-mesh.slo-provisioner.sloth-binary=${SLOTH_BINARY:sloth}
observability-mesh.slo-provisioner.work-dir=${SLO_PROVISIONER_WORK_DIR:./target/slo-provisioner-work}
observability-mesh.slo-provisioner.datasource-names=payment-prometheus
