server.port=9097
spring.application.name=slo-provisioner-service

spring.jackson.property-naming-strategy=SNAKE_CASE

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/open_slo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:open_slo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:open_slo}

observability-mesh.auth.keycloak-token-url=${KEYCLOAK_TOKEN_URL:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/token}
observability-mesh.auth.keycloak-client-id=${KEYCLOAK_CLIENT_ID:observability-mesh-ui}
observability-mesh.auth.keycloak-client-secret=${KEYCLOAK_CLIENT_SECRET:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URL:http://localhost:9080/realms/observability-mesh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/certs}
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.instrumentation.mongo.enabled=false
otel.instrumentation.spring-web.enabled=false
otel.resource.attributes.service.name=${OTEL_SERVICE_NAME:slo-provisioner-service},deployment.environment=${OTEL_DEPLOYMENT_ENVIRONMENT:development}
observability-mesh.slo-provisioner.poll-interval-ms=60000
observability-mesh.slo-provisioner.openslo-table=service_level_objectives
observability-mesh.slo-provisioner.provision-state-table=slo_provision_state
observability-mesh.slo-provisioner.prometheus-rules-dir=${PROMETHEUS_RULES_DIR:./target/sloth-rules}
observability-mesh.slo-provisioner.archive-subdir=_archive
observability-mesh.slo-provisioner.prometheus-reload-url=${PROMETHEUS_RELOAD_URL:http://localhost:9092/-/reload}
observability-mesh.slo-provisioner.sloth-binary=${SLOTH_BINARY:sloth}
observability-mesh.slo-provisioner.work-dir=${SLO_PROVISIONER_WORK_DIR:./target/slo-provisioner-work}
observability-mesh.slo-provisioner.datasource-names=payment-prometheus
