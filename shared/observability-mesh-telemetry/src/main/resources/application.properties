# OpenTelemetry 2.14 still references Boot 3 types for some instrumentations.
otel.instrumentation.mongo.enabled=false
otel.instrumentation.spring-web.enabled=false
# Bridge Micrometer counters (e.g. sanction_scan_completed_total) into the OTel SDK export pipeline.
otel.instrumentation.micrometer.enabled=true

# Collector OTLP/HTTP listener is :4318 (gRPC is :4317). Micrometer needs the /v1/metrics path.
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
management.otlp.metrics.export.step=${OTEL_METRIC_EXPORT_STEP:15s}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
