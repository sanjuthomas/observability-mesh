server.port=9091
spring.application.name=demo-harness

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}

sre-catalog.harness.instruction-service-url=${INSTRUCTION_SERVICE_URL:http://localhost:9000}
sre-catalog.harness.instruction-service-api-prefix=${INSTRUCTION_SERVICE_API_PREFIX:/api/v1}
sre-catalog.harness.payment-service-url=${PAYMENT_SERVICE_URL:http://localhost:9093}
sre-catalog.harness.payment-service-api-prefix=${PAYMENT_SERVICE_API_PREFIX:/api/v1}
sre-catalog.harness.users-file=classpath:users.yaml
sre-catalog.harness.default-password=${DEFAULT_PASSWORD:Password1!}
sre-catalog.harness.email-domain=${EMAIL_DOMAIN:ssi.local}
sre-catalog.harness.admin-user-id=${ADMIN_USER_ID:admin-001}
sre-catalog.harness.security-events-database=${SECURITY_EVENTS_DATABASE:security_events}
sre-catalog.harness.security-events-collection=${SECURITY_EVENTS_COLLECTION:instruction_service}
sre-catalog.harness.payment-security-events-collection=${PAYMENT_SECURITY_EVENTS_COLLECTION:payment_service}
sre-catalog.harness.verify-security-events=${VERIFY_SECURITY_EVENTS:true}

sre-catalog.auth.keycloak-token-url=${KEYCLOAK_TOKEN_URL:http://localhost:9080/realms/sre-catalog/protocol/openid-connect/token}
sre-catalog.auth.keycloak-client-id=${KEYCLOAK_CLIENT_ID:sre-catalog-ui}
sre-catalog.auth.keycloak-client-secret=${KEYCLOAK_CLIENT_SECRET:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URL:http://localhost:9080/realms/sre-catalog}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9080/realms/sre-catalog/protocol/openid-connect/certs}

management.endpoints.web.exposure.include=health,info
