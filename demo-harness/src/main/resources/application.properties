server.port=9091
spring.application.name=demo-harness

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}

observability-mesh.harness.instruction-service-url=${INSTRUCTION_SERVICE_URL:http://localhost:9000}
observability-mesh.harness.instruction-service-api-prefix=${INSTRUCTION_SERVICE_API_PREFIX:/api/v1}
observability-mesh.harness.payment-service-url=${PAYMENT_SERVICE_URL:http://localhost:9093}
observability-mesh.harness.payment-service-api-prefix=${PAYMENT_SERVICE_API_PREFIX:/api/v1}
observability-mesh.harness.users-file=classpath:users.yaml
observability-mesh.harness.default-password=${DEFAULT_PASSWORD:Password1!}
observability-mesh.harness.email-domain=${EMAIL_DOMAIN:ssi.local}
observability-mesh.harness.admin-user-id=${ADMIN_USER_ID:admin-001}
observability-mesh.harness.security-events-database=${SECURITY_EVENTS_DATABASE:security_events}
observability-mesh.harness.security-events-collection=${SECURITY_EVENTS_COLLECTION:instruction_service}
observability-mesh.harness.payment-security-events-collection=${PAYMENT_SECURITY_EVENTS_COLLECTION:payment_service}
observability-mesh.harness.verify-security-events=${VERIFY_SECURITY_EVENTS:true}

observability-mesh.auth.keycloak-token-url=${KEYCLOAK_TOKEN_URL:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/token}
observability-mesh.auth.keycloak-client-id=${KEYCLOAK_CLIENT_ID:observability-mesh-ui}
observability-mesh.auth.keycloak-client-secret=${KEYCLOAK_CLIENT_SECRET:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URL:http://localhost:9080/realms/observability-mesh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/certs}

management.endpoints.web.exposure.include=health,info
