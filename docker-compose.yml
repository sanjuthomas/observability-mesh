x-otel-environment: &otel-environment
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_LOG_CONSOLE: "true"
  OTEL_DEPLOYMENT_ENVIRONMENT: development
  OTEL_METRIC_EXPORT_INTERVAL: "15000"

x-keycloak-environment: &keycloak-environment
  OIDC_ISSUER_URL: http://localhost:9080/realms/observability-mesh
  OIDC_JWK_SET_URI: http://keycloak:9080/realms/observability-mesh/protocol/openid-connect/certs
  KEYCLOAK_TOKEN_URL: http://keycloak:9080/realms/observability-mesh/protocol/openid-connect/token
  KEYCLOAK_CLIENT_ID: observability-mesh-ui
  KEYCLOAK_CLIENT_SECRET: ""

name: observability-mesh

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      opensearch:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped
    networks:
      - observability-mesh-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-sloth-rules:/etc/prometheus/rules-sloth
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch
    environment:
      cluster.name: observability-mesh
      node.name: opensearch
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability-mesh-net

  opa:
    image: openpolicyagent/opa:1.17.1
    container_name: opa-server
    ports:
      - "9181:9181"
    command:
      - run
      - --server
      - --addr
      - :9181
      - --log-level
      - info
      - /policies
    volumes:
      - ./opa-policy-seed/policies:/policies:ro
    restart: unless-stopped
    networks:
      - observability-mesh-net

  opa-policy-seed:
    build: ./opa-policy-seed
    container_name: opa-policy-seed
    depends_on:
      - opa
    environment:
      OPA_URL: http://opa:9181
      POLICIES_DIR: /policies
    volumes:
      - ./opa-policy-seed/policies:/policies:ro
    restart: "no"
    networks:
      - observability-mesh-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - observability-mesh-net

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mongosh --host mongodb:27017 --quiet --eval '
          try {
            const status = rs.status();
            if (status.ok !== 1) throw new Error("not ready");
            quit(0);
          } catch (e) {
            rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongodb:27017"}]});
          }
        '
        until mongosh --host mongodb:27017 --quiet --eval 'rs.isMaster().ismaster' | grep -q true; do
          sleep 1
        done
    networks:
      - observability-mesh-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: open_slo
      POSTGRES_USER: open_slo
      POSTGRES_PASSWORD: open_slo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_slo -d open_slo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9080
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak-seed/realm-observability-mesh.json:/opt/keycloak/data/import/realm-observability-mesh.json:ro
    ports:
      - "9080:9080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9080; echo -e 'GET /realms/observability-mesh/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q 200",
        ]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 40s
    restart: unless-stopped
    networks:
      - observability-mesh-net

  keycloak-seed:
    build: ./keycloak-seed
    container_name: keycloak-seed
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:9080
      KEYCLOAK_REALM: observability-mesh
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    restart: "no"
    networks:
      - observability-mesh-net

  sequence-service:
    build:
      context: .
      dockerfile: sequence-service/Dockerfile
    container_name: sequence-service
    ports:
      - "9095:9095"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: sequence-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_sequences
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - observability-mesh-net

  authorization-service:
    build:
      context: .
      dockerfile: authorization-service/Dockerfile
    container_name: authorization-service
    ports:
      - "9094:9094"
    environment:
      <<: [*otel-environment, *keycloak-environment]
      OTEL_SERVICE_NAME: authorization-service
      OPA_URL: http://opa:9181
      USERS_FILE: /app/keycloak-seed/users.yaml
    volumes:
      - ./keycloak-seed:/app/keycloak-seed:ro
    depends_on:
      opa-policy-seed:
        condition: service_completed_successfully
      keycloak-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - observability-mesh-net

  instruction-service:
    build:
      context: .
      dockerfile: instruction-service/Dockerfile
    container_name: instruction-service
    ports:
      - "9000:9000"
    environment:
      <<: [*otel-environment, *keycloak-environment]
      OTEL_SERVICE_NAME: instruction-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_cash_instructions
      AUTHORIZATION_SERVICE_URL: http://authorization-service:9094
      SEQUENCE_SERVICE_URL: http://sequence-service:9095
      SERVICE_USER_ID: svc-instruction
      SERVICE_USER_PASSWORD: Password1!
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      opa-policy-seed:
        condition: service_completed_successfully
      keycloak-seed:
        condition: service_completed_successfully
      sequence-service:
        condition: service_started
      authorization-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - observability-mesh-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "9093:9093"
    environment:
      <<: [*otel-environment, *keycloak-environment]
      OTEL_SERVICE_NAME: payment-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_cash_activities
      AUTHORIZATION_SERVICE_URL: http://authorization-service:9094
      INSTRUCTION_SERVICE_URL: http://instruction-service:9000
      SEQUENCE_SERVICE_URL: http://sequence-service:9095
      SERVICE_USER_ID: svc-payment
      SERVICE_USER_PASSWORD: Password1!
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      opa-policy-seed:
        condition: service_completed_successfully
      keycloak-seed:
        condition: service_completed_successfully
      instruction-service:
        condition: service_started
      authorization-service:
        condition: service_started
      sequence-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - observability-mesh-net

  ofac-service:
    build:
      context: .
      dockerfile: ofac-service/Dockerfile
    container_name: ofac-service
    ports:
      - "9096:9096"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: ofac-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_cash_activities
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      payment-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - observability-mesh-net

  slo-author-service:
    build:
      context: .
      dockerfile: slo-author-service/Dockerfile
    container_name: slo-author-service
    ports:
      - "9090:9090"
    environment:
      <<: [*otel-environment, *keycloak-environment]
      OTEL_SERVICE_NAME: slo-author-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/open_slo
      SPRING_DATASOURCE_USERNAME: open_slo
      SPRING_DATASOURCE_PASSWORD: open_slo
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - observability-mesh-net

  slo-provisioner-service:
    build:
      context: .
      dockerfile: slo-provisioner-service/Dockerfile
    container_name: slo-provisioner-service
    ports:
      - "9097:9097"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: slo-provisioner-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/open_slo
      SPRING_DATASOURCE_USERNAME: open_slo
      SPRING_DATASOURCE_PASSWORD: open_slo
      PROMETHEUS_RULES_DIR: /rules
      PROMETHEUS_RELOAD_URL: http://prometheus:9090/-/reload
      SLO_PROVISIONER_WORK_DIR: /work
      SLOTH_BINARY: /usr/local/bin/sloth
    volumes:
      - prometheus-sloth-rules:/rules
    depends_on:
      postgres:
        condition: service_healthy
      slo-author-service:
        condition: service_started
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability-mesh-net

  demo-harness:
    build:
      context: .
      dockerfile: demo-harness/Dockerfile
    container_name: demo-harness
    ports:
      - "9091:9091"
    environment:
      <<: *keycloak-environment
      INSTRUCTION_SERVICE_URL: http://instruction-service:9000
      PAYMENT_SERVICE_URL: http://payment-service:9093
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      SRE_CATALOG_HARNESS_USERS_FILE: /app/keycloak-seed/users.yaml
    volumes:
      - ./keycloak-seed/users.yaml:/app/keycloak-seed/users.yaml:ro
    depends_on:
      instruction-service:
        condition: service_started
      payment-service:
        condition: service_started
      keycloak-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - observability-mesh-net

networks:
  observability-mesh-net:
    name: observability-mesh-net

volumes:
  mongo-data:
  postgres-data:
  opensearch-data:
  prometheus-data:
  prometheus-sloth-rules:
  tempo-data:
  grafana-data:
