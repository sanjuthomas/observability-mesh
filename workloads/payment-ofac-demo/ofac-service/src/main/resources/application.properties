server.port=9096
spring.application.name=ofac-service

spring.jackson.property-naming-strategy=SNAKE_CASE

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}
spring.data.mongodb.database=${MONGODB_DATABASE:ofac}

observability-mesh.auth.keycloak-token-url=${KEYCLOAK_TOKEN_URL:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/token}
observability-mesh.auth.keycloak-client-id=${KEYCLOAK_CLIENT_ID:observability-mesh-ui}
observability-mesh.auth.keycloak-client-secret=${KEYCLOAK_CLIENT_SECRET:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URL:http://localhost:9080/realms/observability-mesh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/certs}
management.endpoints.web.exposure.include=health,info,prometheus
otel.instrumentation.mongo.enabled=false
otel.instrumentation.spring-web.enabled=false
otel.resource.attributes.service.name=${OTEL_SERVICE_NAME:ofac-service},deployment.environment=${OTEL_DEPLOYMENT_ENVIRONMENT:development}
observability-mesh.ofac.scan-requests-collection=scan-requests
observability-mesh.ofac.poll-interval-ms=30000
observability-mesh.ofac.min-scan-delay-ms=30000
observability-mesh.ofac.max-scan-delay-ms=60000
observability-mesh.ofac.mutant-mode=off
observability-mesh.ofac.mutant-payment-id-prefix=
observability-mesh.ofac.mutant-unable-to-determine-percent=15
observability-mesh.ofac.mutant-min-scan-delay-ms=90000
observability-mesh.ofac.mutant-max-scan-delay-ms=120000
