server.port=9000
spring.application.name=instruction-service

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}
spring.data.mongodb.database=${MONGODB_DATABASE:ssi_cash_instructions}

observability-mesh.instruction.collection=instructions
observability-mesh.instruction.security-events-database=security_events
observability-mesh.instruction.security-events-collection=instruction_service

observability-mesh.authz.url=${AUTHORIZATION_SERVICE_URL:http://localhost:9094}
observability-mesh.sequence.url=${SEQUENCE_SERVICE_URL:http://localhost:9095}

observability-mesh.auth.keycloak-token-url=${KEYCLOAK_TOKEN_URL:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/token}
observability-mesh.auth.keycloak-client-id=${KEYCLOAK_CLIENT_ID:observability-mesh-ui}
observability-mesh.auth.keycloak-client-secret=${KEYCLOAK_CLIENT_SECRET:}

observability-mesh.instruction.service-user-id=${SERVICE_USER_ID:svc-instruction}
observability-mesh.instruction.service-user-password=${SERVICE_USER_PASSWORD:Password1!}

observability-mesh.instruction.compliance-roles=${COMPLIANCE_ROLES:COMPLIANCE_ANALYST,COMPLIANCE_OFFICER,PLATFORM_ADMIN}
observability-mesh.instruction.security-event-excluded-user-ids=${SECURITY_EVENT_EXCLUDED_USER_IDS:}
observability-mesh.instruction.security-event-view-excluded-user-ids=${SECURITY_EVENT_VIEW_EXCLUDED_USER_IDS:admin-001}
observability-mesh.instruction.ui-initial-security-event-limit=${UI_INITIAL_SECURITY_EVENT_LIMIT:200}

management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.instrumentation.mongo.enabled=false
otel.instrumentation.spring-web.enabled=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URL:http://localhost:9080/realms/observability-mesh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9080/realms/observability-mesh/protocol/openid-connect/certs}
