server.port=9096
spring.application.name=ofac-service
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?replicaSet=rs0}
spring.data.mongodb.database=${MONGODB_DATABASE:ssi_cash_activities}
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.resource.attributes.service.name=${OTEL_SERVICE_NAME:ofac-service},deployment.environment=${OTEL_DEPLOYMENT_ENVIRONMENT:development}
sre-catalog.ofac.scan-requests-collection=ofac-scan-requests
sre-catalog.ofac.poll-interval-ms=30000
sre-catalog.ofac.min-scan-delay-ms=30000
sre-catalog.ofac.max-scan-delay-ms=60000
